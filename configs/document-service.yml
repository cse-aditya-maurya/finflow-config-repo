server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/finflow_document
    username: root
    password: Adi@2552
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

file:
  upload-dir: ./uploads

jwt:
  secret: finflow-super-secret-jwt-key-must-be-at-least-256-bits-long-for-hs256

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
