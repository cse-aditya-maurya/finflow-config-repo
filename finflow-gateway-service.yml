server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      routes:
        # Auth Service Routes
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0
            
        # Application Service Routes
        - id: application-service
          uri: lb://application-service
          predicates:
            - Path=/applications/**
          filters:
            - StripPrefix=0
            
        # Document Service Routes
        - id: document-service
          uri: lb://document-service
          predicates:
            - Path=/documents/**
          filters:
            - StripPrefix=0
            
        # Admin Service Routes
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=0

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: localhost
    prefer-ip-address: true

# SpringDoc Configuration for Gateway
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: Application Service
        url: /applications/v3/api-docs
      - name: Document Service
        url: /documents/v3/api-docs
      - name: Admin Service
        url: /admin/v3/api-docs
    urls-primary-name: Auth Service
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springdoc: DEBUG
    com.finflow.gateway: DEBUG

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,routes
  endpoint:
    gateway:
      enabled: true
