spring:
  cloud:
    gateway:
      mvc:
        routes:

          - id: auth-service
            uri: lb://FINFLOW-AUTH-SERVICE
            predicates:
              - Path=/auth/**

          - id: application-service
            uri: lb://FINFLOW-APPLICATION-SERVICE
            predicates:
              - Path=/application/**

          - id: admin-service
            uri: lb://FINFLOW-ADMIN-SERVICE
            predicates:
              - Path=/admin/**

          - id: document-service
            uri: lb://FINFLOW-DOCUMENT-SERVICE
            predicates:
              - Path=/document/**
