spring:
  application:
    name: finflow-gateway-service

  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            # uri: lb://FINFLOW-AUTH-SERVICE
            uri: http://localhost:8081
            predicates:
              # - Path=/gateway/auth/**
              - Path=/gateway/**
            filters:
              - StripPrefix=1

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"
